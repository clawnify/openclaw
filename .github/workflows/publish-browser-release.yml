name: Publish @openclaw/browser-plugin (Clawnify fork) release

# Builds the Clawnify fork of @openclaw/browser-plugin for a SPECIFIC upstream
# release and publishes the installable tarball as a GitHub Release asset.
#
# Our delta is kept as a version-independent patch
# (clawnify-patches/browser-env-vars.patch): it adds {{env:KEY}} substitution
# to the browser tool's type/fill/select actions, gated by the native
# secrets.providers.<env>.allowlist. The same delta is proposed upstream
# (openclaw/openclaw#89234).
#
# To produce a build compatible with openclaw runtime vX, push a tag
# `browser-vX` (or dispatch with upstream_tag=vX): CI checks out upstream vX,
# applies the patch, builds, and releases `browser-vX`. The fleet installs the
# browser-v<runtime-version> matching its pinned openclaw runtime.
#
# Usually the patch applies cleanly; when upstream refactors the touched files
# (browser-tool.actions.ts) the `git apply` step fails — resolve once, refresh
# the patch, re-tag. Interim until openclaw/openclaw#89234 lands.

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream openclaw release tag to build against (e.g. v2026.5.20)"
        required: true
        default: "v2026.5.20"
  push:
    tags:
      - "browser-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (for the patch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target upstream tag
        id: target
        run: |
          if [ -n "${{ inputs.upstream_tag }}" ]; then
            TAG="${{ inputs.upstream_tag }}"
          else
            # tag push: browser-v2026.5.20 -> v2026.5.20
            TAG="${GITHUB_REF_NAME#browser-}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building against upstream openclaw $TAG"

      - name: Stash our patch
        run: |
          mkdir -p /tmp/overlay
          cp clawnify-patches/browser-env-vars.patch /tmp/overlay/

      - name: Check out upstream release + apply our delta
        run: |
          git config user.email "ci@clawnify.com"
          git config user.name "clawnify-ci"
          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch --no-tags --depth 1 upstream "refs/tags/${{ steps.target.outputs.tag }}:refs/tags/${{ steps.target.outputs.tag }}"
          git checkout -f "${{ steps.target.outputs.tag }}"
          git apply --3way --whitespace=nowarn /tmp/overlay/browser-env-vars.patch
          echo "Applied Clawnify browser env-vars delta onto ${{ steps.target.outputs.tag }}"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The browser plugin is BUNDLED into the runtime (loads as stock:browser),
      # uses child_process/eval (so the external-plugin security scan blocks
      # installing it as a tarball), AND tsdown hoists its modules into shared
      # chunks across the whole runtime bundle. So the change can't be isolated
      # to extensions/browser — we ship the entire compiled dist/ as a runtime
      # overlay. node_modules/deps are unchanged from stock 2026.5.20, so the
      # fleet drops this dist/ over the INSTALLED runtime's dist/ and restarts.
      - name: Build patched runtime (compiled dist)
        run: |
          pnpm plugins:assets:build
          node scripts/tsdown-build.mjs
          node scripts/build-stamp.mjs

      - name: Pack runtime dist overlay
        id: pack
        run: |
          test -f dist/extensions/browser/index.js || { echo "missing compiled runtime"; exit 1; }
          # Identifiers are minified; assert on a string literal from env-secrets.ts
          # somewhere in the compiled dist (it lands in a shared chunk).
          grep -rq "providers.<env>.allowlist" dist/ || { echo "patch not present in built dist"; exit 1; }
          VERSION="${{ steps.target.outputs.tag }}"; VERSION="${VERSION#v}"
          TARBALL="openclaw-runtime-dist-overlay-${VERSION}.tgz"
          # Exclude staged node_modules: the installed runtime already has them
          # (deps are unchanged); we only overlay compiled JS.
          tar czf "$TARBALL" --exclude='node_modules' -C dist .
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$TARBALL" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-v${{ steps.pack.outputs.version }}
          name: "openclaw runtime dist overlay ${{ steps.pack.outputs.version }} (Clawnify fork + browser env-var typing)"
          body: |
            Compiled `dist/` for openclaw `${{ steps.target.outputs.tag }}` patched with `{{env:KEY}}`
            substitution in the browser tool's type/fill/select actions, gated by the native
            `secrets.providers.<env>.allowlist` (${{ steps.pack.outputs.size }}, node_modules excluded).

            The browser plugin is bundled and chunk-shared across the runtime bundle, so it can't be shipped
            as an isolated plugin/dir. Apply on a server running openclaw `${{ steps.pack.outputs.version }}`
            by overlaying the compiled dist/ into the installed runtime:
            ```
            D="$(dirname "$(readlink -f "$(which openclaw)")")/dist"
            cp -a "$D" "$D.bak"
            curl -fsSL <this-asset-url> | tar xz -C "$D"
            systemctl restart openclaw-gateway
            ```
            Interim until openclaw/openclaw#89234 lands.
          files: ${{ steps.pack.outputs.tarball }}
          fail_on_unmatched_files: true
