name: Publish @openclaw/whatsapp (Clawnify fork) release

# Builds the Clawnify fork of @openclaw/whatsapp (= the matching upstream
# release tag + our group-management agent tools) and publishes the installable
# tarball as a GitHub Release asset. The Clawnify fleet installs it via
#   openclaw plugins install <release-asset-url> --force --pin
# and enables it with OPENCLAW_WHATSAPP_GROUPS=1.
#
# This is the interim distribution + auto-build point until the upstream PR
# (group tools in stock @openclaw/whatsapp) lands, after which the fleet goes
# back to installing stock and this workflow is retired.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "whatsapp-v*"

permissions:
  contents: write # create releases + upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build whatsapp plugin runtime (dist)
        run: node scripts/lib/plugin-npm-runtime-build.mjs extensions/whatsapp

      - name: Pack installable tarball (manifest overlay adds runtimeExtensions)
        id: pack
        run: |
          rm -f extensions/whatsapp/*.tgz
          node scripts/lib/plugin-npm-package-manifest.mjs --run extensions/whatsapp -- npm pack --ignore-scripts
          TARBALL=$(ls extensions/whatsapp/*.tgz | head -1)
          VERSION=$(node -e "console.log(require('./extensions/whatsapp/package.json').version)")
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Built $TARBALL (version $VERSION)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: whatsapp-v${{ steps.pack.outputs.version }}
          name: "@openclaw/whatsapp ${{ steps.pack.outputs.version }} (Clawnify fork + group tools)"
          body: |
            Clawnify fork of `@openclaw/whatsapp@${{ steps.pack.outputs.version }}` with opt-in
            WhatsApp group-management agent tools (`whatsapp_group_create`,
            `whatsapp_group_add_participants`, `whatsapp_group_invite_link`),
            gated behind the `OPENCLAW_WHATSAPP_GROUPS=1` env var.

            Install on a server:
            ```
            openclaw plugins install <this-asset-url> --force --pin
            ```
            Interim until the upstream PR (openclaw/openclaw#89033) lands.
          files: ${{ steps.pack.outputs.tarball }}
          fail_on_unmatched_files: true
